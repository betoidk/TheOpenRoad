<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheOpenRoad SA de CV</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const API_URL = "http://127.0.0.1:8000";

      const DashboardATS = () => {
        const [vistaActual, setVistaActual] = useState("candidatos");
        const [busqueda, setBusqueda] = useState("");
        const [cargando, setCargando] = useState(true);
        const [errorConexion, setErrorConexion] = useState(false);

        const [vacantes, setVacantes] = useState([]);
        const [candidatos, setCandidatos] = useState([]);

        const [mostrarModalCandidato, setMostrarModalCandidato] =
          useState(false);
        const [mostrarModalVacante, setMostrarModalVacante] = useState(false);
        const [mostrarModalEvaluacion, setMostrarModalEvaluacion] =
          useState(false);

        const [candidatoSeleccionado, setCandidatoSeleccionado] =
          useState(null);

        const [modoEdicionCandidato, setModoEdicionCandidato] = useState(false);
        const [modoEdicionVacante, setModoEdicionVacante] = useState(false);

        const [mostrarFiltrosCand, setMostrarFiltrosCand] = useState(false);
        const [filtroEstadoCand, setFiltroEstadoCand] = useState("");
        const [mostrarFiltrosVac, setMostrarFiltrosVac] = useState(false);
        const [filtroEstadoVac, setFiltroEstadoVac] = useState("");

        const [nuevoCandidato, setNuevoCandidato] = useState({
          id: null,
          nombre_completo: "",
          email: "",
          origen: "Correo",
          habilidades: "",
          cvFile: null,
          vacanteId: "",
        });

        const [nuevaVacante, setNuevaVacante] = useState({
          id: null,
          titulo: "",
          descripcion: "",
          estado: "Abierta",
          id_creador: 1,
        });

        useEffect(() => {
          cargarDatos();
        }, []);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [
          vistaActual,
          candidatos,
          vacantes,
          cargando,
          errorConexion,
          mostrarModalCandidato,
          mostrarModalVacante,
          mostrarModalEvaluacion,
          busqueda,
          mostrarFiltrosCand,
          mostrarFiltrosVac,
        ]);

        const cargarDatos = async () => {
          setCargando(true);
          setErrorConexion(false);
          try {
            const resVacantes = await fetch(`${API_URL}/vacantes/`);
            if (!resVacantes.ok) throw new Error("Error obteniendo vacantes");
            const dataVacantes = await resVacantes.json();

            const resCandidatos = await fetch(`${API_URL}/candidatos/`);
            if (!resCandidatos.ok)
              throw new Error("Error obteniendo candidatos");
            const dataCandidatos = await resCandidatos.json();

            setVacantes(dataVacantes);

            const candidatosAdaptados = dataCandidatos.map((c) => {
              const tieneArchivo = c.url_cv && c.url_cv.startsWith("/");
              return {
                id: c.id,
                nombre: c.nombre_completo,
                email: c.email,
                origen: c.origen,
                documento: tieneArchivo ? c.url_cv : null,
                habilidades: tieneArchivo
                  ? []
                  : c.url_cv
                    ? c.url_cv.split(",").map((s) => s.trim())
                    : [],
                estado: c.estado || "Recibido",
                historial: c.historial
                  ? c.historial
                      .split("|")
                      .map((s) => s.trim())
                      .filter((s) => s)
                  : ["CV Registrado en MySQL"],
                vacanteId: c.id_vacante || null,
              };
            });
            setCandidatos(candidatosAdaptados);
          } catch (error) {
            console.error("Error conectando con la API:", error);
            setErrorConexion(true);
          } finally {
            setCargando(false);
          }
        };

        const handleGuardarVacante = async (e) => {
          e.preventDefault();
          try {
            const url = modoEdicionVacante
              ? `${API_URL}/vacantes/${nuevaVacante.id}`
              : `${API_URL}/vacantes/`;
            const method = modoEdicionVacante ? "PUT" : "POST";

            const response = await fetch(url, {
              method: method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(nuevaVacante),
            });

            if (response.ok) {
              cargarDatos();
              setMostrarModalVacante(false);
              resetFormularioVacante();
            } else {
              alert("Error al guardar la vacante en MySQL.");
            }
          } catch (error) {
            console.error(error);
          }
        };

        const abrirModalEdicionVacante = (vacante) => {
          setNuevaVacante({
            id: vacante.id,
            titulo: vacante.titulo,
            descripcion: vacante.descripcion,
            estado: vacante.estado,
            id_creador: vacante.id_creador,
          });
          setModoEdicionVacante(true);
          setMostrarModalVacante(true);
        };

        const abrirModalNuevaVacante = () => {
          resetFormularioVacante();
          setMostrarModalVacante(true);
        };

        const resetFormularioVacante = () => {
          setNuevaVacante({
            id: null,
            titulo: "",
            descripcion: "",
            estado: "Abierta",
            id_creador: 1,
          });
          setModoEdicionVacante(false);
        };

        const handleGuardarCandidato = async (e) => {
          e.preventDefault();
          try {
            const formData = new FormData();
            formData.append("nombre_completo", nuevoCandidato.nombre_completo);
            formData.append("email", nuevoCandidato.email);
            formData.append("origen", nuevoCandidato.origen);
            formData.append("habilidades", nuevoCandidato.habilidades);

            if (nuevoCandidato.vacanteId) {
              formData.append("id_vacante", nuevoCandidato.vacanteId);
            }
            if (nuevoCandidato.cvFile) {
              formData.append("cv", nuevoCandidato.cvFile);
            }

            const url = modoEdicionCandidato
              ? `${API_URL}/candidatos/${nuevoCandidato.id}`
              : `${API_URL}/candidatos/`;
            const method = modoEdicionCandidato ? "PUT" : "POST";

            const response = await fetch(url, {
              method: method,
              body: formData,
            });

            if (response.ok) {
              cargarDatos();
              setMostrarModalCandidato(false);
              resetFormularioCandidato();
            } else {
              const errorData = await response.json();
              alert("Error: " + (errorData.detail || "No se pudo guardar"));
            }
          } catch (error) {
            console.error(error);
          }
        };

        const abrirModalEdicionCandidato = (candidato) => {
          setNuevoCandidato({
            id: candidato.id,
            nombre_completo: candidato.nombre,
            email: candidato.email,
            origen: candidato.origen,
            habilidades: candidato.habilidades.join(", "),
            vacanteId: candidato.vacanteId || "",
            cvFile: null,
          });
          setModoEdicionCandidato(true);
          setMostrarModalCandidato(true);
        };

        const abrirModalNuevoCandidato = () => {
          resetFormularioCandidato();
          setMostrarModalCandidato(true);
        };

        const resetFormularioCandidato = () => {
          setNuevoCandidato({
            id: null,
            nombre_completo: "",
            email: "",
            origen: "Correo",
            habilidades: "",
            cvFile: null,
            vacanteId: "",
          });
          setModoEdicionCandidato(false);
        };

        const handleEvaluar = async (e) => {
          e.preventDefault();
          if (!candidatoSeleccionado) return;

          const form = e.target;
          const decision = form.decision.value;
          const comentarios = form.comentarios.value;

          let nuevoEstado = decision;
          if (decision === "Aceptar") nuevoEstado = "Aceptado";
          if (decision === "Rechazar") nuevoEstado = "Rechazado";

          try {
            const response = await fetch(
              `${API_URL}/candidatos/${candidatoSeleccionado.id}/evaluar`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  estado: nuevoEstado,
                  comentarios: comentarios,
                }),
              },
            );

            if (response.ok) {
              cargarDatos();
              setMostrarModalEvaluacion(false);
              setCandidatoSeleccionado(null);
            } else {
              alert("Error al guardar la evaluación en MySQL.");
            }
          } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión al evaluar.");
          }
        };

        const handleEliminarVacante = async (id) => {
          if (
            window.confirm(
              "¿Seguro que deseas eliminar esta vacante de forma permanente?",
            )
          ) {
            try {
              const response = await fetch(`${API_URL}/vacantes/${id}`, {
                method: "DELETE",
              });
              if (response.ok) {
                cargarDatos();
              } else {
                alert("Error al eliminar la vacante en MySQL.");
              }
            } catch (error) {
              console.error(error);
            }
          }
        };

        const handleEliminarCandidato = async (id) => {
          if (
            window.confirm(
              "¿Seguro que deseas eliminar este candidato de forma permanente?",
            )
          ) {
            try {
              const response = await fetch(`${API_URL}/candidatos/${id}`, {
                method: "DELETE",
              });
              if (response.ok) {
                cargarDatos();
              } else {
                alert("Error al eliminar el candidato en MySQL.");
              }
            } catch (error) {
              console.error(error);
            }
          }
        };

        const candidatosFiltrados = candidatos.filter((c) => {
          const search = busqueda.toLowerCase();
          const habilidades = c.habilidades || [];

          const coincideBusqueda =
            c.nombre?.toLowerCase().includes(search) ||
            habilidades.some((h) => h.toLowerCase().includes(search));
          const coincideEstado =
            filtroEstadoCand === "" || c.estado === filtroEstadoCand;

          return coincideBusqueda && coincideEstado;
        });

        const vacantesFiltradas = vacantes.filter((v) => {
          const search = busqueda.toLowerCase();

          const coincideBusqueda =
            v.titulo?.toLowerCase().includes(search) ||
            v.descripcion?.toLowerCase().includes(search);
          const coincideEstado =
            filtroEstadoVac === "" || v.estado === filtroEstadoVac;

          return coincideBusqueda && coincideEstado;
        });

        const getNombreVacante = (id) => {
          if (!id) return "Candidatura General";
          const vacante = vacantes.find((v) => v.id === parseInt(id));
          return vacante ? vacante.titulo : "Candidatura General";
        };

        const renderEstadoBadge = (estado) => {
          if (estado === "Aceptar") estado = "Aceptado";
          if (estado === "Rechazar") estado = "Rechazado";

          switch (estado) {
            case "Aceptado":
              return (
                <span className="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <i data-lucide="check-circle" className="w-3.5 h-3.5"></i>{" "}
                  Aceptado
                </span>
              );
            case "Rechazado":
              return (
                <span className="px-3 py-1 bg-red-100 text-red-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <i data-lucide="x-circle" className="w-3.5 h-3.5"></i>{" "}
                  Rechazado
                </span>
              );
            case "Entrevista":
              return (
                <span className="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <i data-lucide="calendar" className="w-3.5 h-3.5"></i>{" "}
                  Entrevista
                </span>
              );
            default:
              return (
                <span className="px-3 py-1 bg-gray-100 text-gray-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <i data-lucide="clock" className="w-3.5 h-3.5"></i> {estado}
                </span>
              );
          }
        };

        if (cargando && vacantes.length === 0) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
              <div className="w-12 h-12 border-4 border-teal-200 border-t-teal-600 rounded-full animate-spin mb-4"></div>
              <p className="text-slate-600 font-medium">
                Conectando a FastAPI (MySQL)...
              </p>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
            <aside className="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl shrink-0">
              <div className="p-6 border-b border-slate-700">
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <i
                    data-lucide="briefcase"
                    className="w-6 h-6 text-teal-400"
                  ></i>{" "}
                  TheOpenRoad
                </h1>
                <p className="text-xs text-slate-400 mt-1">
                  SA de CV
                </p>
              </div>

              <nav className="flex-1 py-4">
                <ul className="space-y-1">
                  <li>
                    <button
                      onClick={() => {
                        setVistaActual("candidatos");
                        setBusqueda("");
                      }}
                      className={`w-full flex items-center gap-3 px-6 py-3 hover:bg-slate-800 transition-colors ${vistaActual === "candidatos" ? "bg-slate-800 text-teal-400 border-r-4 border-teal-400" : ""}`}
                    >
                      <i data-lucide="users" className="w-5 h-5"></i>
                      <span className="font-medium">Base de Candidatos</span>
                    </button>
                  </li>
                  <li>
                    <button
                      onClick={() => {
                        setVistaActual("vacantes");
                        setBusqueda("");
                      }}
                      className={`w-full flex items-center gap-3 px-6 py-3 hover:bg-slate-800 transition-colors ${vistaActual === "vacantes" ? "bg-slate-800 text-teal-400 border-r-4 border-teal-400" : ""}`}
                    >
                      <i data-lucide="file-text" className="w-5 h-5"></i>
                      <span className="font-medium">Registro de Vacantes</span>
                    </button>
                  </li>
                </ul>
              </nav>

              <div className="p-6 border-t border-slate-700">
                {errorConexion ? (
                  <div className="text-xs text-red-400 bg-red-400/10 p-2 rounded flex items-center gap-2">
                    <i data-lucide="wifi-off" className="w-4 h-4"></i> API
                    Desconectada
                  </div>
                ) : (
                  <div className="text-xs text-emerald-400 bg-emerald-400/10 p-2 rounded flex items-center gap-2">
                    <i data-lucide="database" className="w-4 h-4"></i> MySQL
                    Conectado
                  </div>
                )}
              </div>
            </aside>

            <main className="flex-1 flex flex-col h-screen overflow-hidden">
              <header className="bg-white shadow-sm border-b border-slate-200 px-8 py-4 flex flex-col sm:flex-row justify-between items-center z-10 gap-4 shrink-0">
                <h2 className="text-xl font-semibold text-slate-800">
                  {vistaActual === "candidatos"
                    ? "Directorio de Candidatos"
                    : "Gestión de Vacantes"}
                </h2>

                <div className="flex gap-4 w-full sm:w-auto">
                  <div className="relative flex-1 sm:w-64">
                    <i
                      data-lucide="search"
                      className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4"
                    ></i>
                    <input
                      type="text"
                      placeholder={
                        vistaActual === "candidatos"
                          ? "Buscar candidato..."
                          : "Buscar vacante..."
                      }
                      value={busqueda}
                      onChange={(e) => setBusqueda(e.target.value)}
                      className="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                    />
                  </div>
                  <button
                    onClick={() =>
                      vistaActual === "candidatos"
                        ? abrirModalNuevoCandidato()
                        : abrirModalNuevaVacante()
                    }
                    className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors shadow-sm whitespace-nowrap"
                  >
                    <i data-lucide="plus" className="w-4 h-4"></i>
                    {vistaActual === "candidatos"
                      ? "Añadir Candidato"
                      : "Nueva Vacante"}
                  </button>
                </div>
              </header>

              <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div className="p-3 bg-blue-50 text-blue-600 rounded-lg">
                      <i data-lucide="users" className="w-6 h-6"></i>
                    </div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">
                        Total Candidatos
                      </p>
                      <p className="text-2xl font-bold text-slate-800">
                        {candidatos.length}
                      </p>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div className="p-3 bg-teal-50 text-teal-600 rounded-lg">
                      <i data-lucide="briefcase" className="w-6 h-6"></i>
                    </div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">
                        Vacantes Activas
                      </p>
                      <p className="text-2xl font-bold text-slate-800">
                        {vacantes.filter((v) => v.estado === "Abierta").length}
                      </p>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div className="p-3 bg-orange-50 text-orange-600 rounded-lg">
                      <i data-lucide="database" className="w-6 h-6"></i>
                    </div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">
                        Base de Datos
                      </p>
                      <p className="text-xl font-bold text-slate-800">
                        MySQL Local
                      </p>
                    </div>
                  </div>
                </div>

                {vistaActual === "candidatos" && !errorConexion && (
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-white">
                      <h3 className="font-semibold text-slate-800 flex items-center gap-2">
                        Base de Candidatos en MySQL
                      </h3>

                      <div className="relative">
                        <button
                          onClick={() =>
                            setMostrarFiltrosCand(!mostrarFiltrosCand)
                          }
                          className="text-slate-500 hover:text-teal-600 flex items-center gap-2 text-sm font-medium border border-slate-300 px-3 py-1.5 rounded-md hover:bg-slate-50 transition-colors"
                        >
                          <i data-lucide="filter" className="w-4 h-4"></i>{" "}
                          Filtros
                          {filtroEstadoCand !== "" && (
                            <span className="absolute -top-1 -right-1 flex h-3 w-3 rounded-full bg-teal-500 border-2 border-white"></span>
                          )}
                        </button>

                        {mostrarFiltrosCand && (
                          <div className="absolute right-0 mt-2 w-48 bg-white border border-slate-200 shadow-xl rounded-lg z-20 p-3">
                            <p className="text-xs font-semibold text-slate-700 mb-2">
                              Filtrar por Estado:
                            </p>
                            <select
                              value={filtroEstadoCand}
                              onChange={(e) => {
                                setFiltroEstadoCand(e.target.value);
                                setMostrarFiltrosCand(false);
                              }}
                              className="w-full p-2 border border-slate-200 rounded-md text-sm outline-none focus:border-teal-500 bg-slate-50"
                            >
                              <option value="">Todos los estados</option>
                              <option value="Recibido">Recibido</option>
                              <option value="Entrevista">Entrevista</option>
                              <option value="Aceptado">Aceptado</option>
                              <option value="Rechazado">Rechazado</option>
                            </select>
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                          <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th className="px-6 py-4 font-semibold">
                              Candidato / ID
                            </th>
                            <th className="px-6 py-4 font-semibold">
                              Origen / Vacante
                            </th>
                            <th className="px-6 py-4 font-semibold">
                              Habilidades
                            </th>
                            <th className="px-6 py-4 font-semibold">Estado</th>
                            <th className="px-6 py-4 font-semibold text-center">
                              Acciones
                            </th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-200">
                          {candidatosFiltrados.map((cand) => (
                            <tr
                              key={cand.id}
                              className="hover:bg-slate-50 transition-colors group"
                            >
                              <td className="px-6 py-4">
                                <div className="flex items-center gap-3">
                                  <div className="w-8 h-8 rounded-full bg-slate-100 text-xs font-bold text-slate-500 flex items-center justify-center border border-slate-200">
                                    #{cand.id}
                                  </div>
                                  <div className="flex flex-col">
                                    <span className="font-semibold text-slate-800 group-hover:text-teal-700 transition-colors flex items-center gap-1">
                                      {cand.nombre}
                                      {cand.documento && (
                                        <i
                                          data-lucide="paperclip"
                                          className="w-3.5 h-3.5 text-indigo-500"
                                          title="CV Adjunto"
                                        ></i>
                                      )}
                                    </span>
                                    <span className="text-xs text-slate-500">
                                      {cand.email}
                                    </span>
                                  </div>
                                </div>
                              </td>
                              <td className="px-6 py-4">
                                <div className="flex flex-col items-start gap-1">
                                  <span className="px-2.5 py-0.5 bg-white border border-slate-200 text-slate-600 rounded-md text-[10px] font-medium shadow-sm">
                                    {cand.origen}
                                  </span>
                                  <span className="text-xs font-medium text-teal-700 bg-teal-50 px-2 py-0.5 rounded border border-teal-100">
                                    {getNombreVacante(cand.vacanteId)}
                                  </span>
                                </div>
                              </td>
                              <td className="px-6 py-4">
                                <div className="flex flex-wrap gap-1.5 max-w-[200px]">
                                  {cand.habilidades &&

                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">
                        Justificación (Auditable)
                      </label>
                      <textarea
                        required
                        name="comentarios"
                        rows="3"
                        placeholder="Documente los motivos técnicos para la decisión..."
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500/50 focus:border-teal-500 text-sm resize-none"
                      ></textarea>
                    </div>
                    <div className="pt-2">
                      <button
                        type="submit"
                        className="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white text-sm font-bold rounded-lg transition-colors shadow-md active:scale-95"
                      >
                        Guardar Evaluación
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<DashboardATS />);
    </script>
  </body>
</html>
