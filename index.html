<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheOpenRoad SA de CV</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const API_URL = "http://127.0.0.1:8000";

      const DashboardATS = () => {
        const [vistaActual, setVistaActual] = useState("candidatos");
        const [busqueda, setBusqueda] = useState("");
        const [cargando, setCargando] = useState(true);
        const [errorConexion, setErrorConexion] = useState(false);

        const [vacantes, setVacantes] = useState([]);
        const [candidatos, setCandidatos] = useState([]);
        const [cuestionarios, setCuestionarios] = useState([]);

        const [mostrarModalCandidato, setMostrarModalCandidato] =
          useState(false);
        const [mostrarModalVacante, setMostrarModalVacante] = useState(false);
        const [mostrarModalEvaluacion, setMostrarModalEvaluacion] =
          useState(false);
        const [mostrarModalCuestionario, setMostrarModalCuestionario] =
          useState(false);

        const [candidatoSeleccionado, setCandidatoSeleccionado] =
          useState(null);
        const [cuestionarioVistaPrevia, setCuestionarioVistaPrevia] =
          useState(null);

        const [decisionEvaluacion, setDecisionEvaluacion] = useState("");

        const [modoEdicionCandidato, setModoEdicionCandidato] = useState(false);
        const [modoEdicionVacante, setModoEdicionVacante] = useState(false);
        const [modoEdicionCuestionario, setModoEdicionCuestionario] =
          useState(false);

        const [nuevoCandidato, setNuevoCandidato] = useState({
          id: null,
          nombre_completo: "",
          email: "",
          origen: "Correo",
          habilidades: "",
          cvFile: null,
          vacanteId: "",
        });

        const [nuevaVacante, setNuevaVacante] = useState({
          id: null,
          titulo: "",
          descripcion: "",
          estado: "Abierta",
          id_creador: 1,
          id_cuestionario: "",
        });

        const [nuevoCuestionario, setNuevoCuestionario] = useState({
          id: null,
          titulo: "",
          preguntas: [
            { texto: "", tipo: "abierta", opciones: [""], opcionCorrecta: 0 },
          ],
        });

        const [filtroEstadoCandidato, setFiltroEstadoCandidato] =
          useState("Todos");
        const [filtroEstadoVacante, setFiltroEstadoVacante] = useState("Todas");
        const [filtroEstadoCuestionario, setFiltroEstadoCuestionario] =
          useState("Todos");
        const [menuFiltroAbierto, setMenuFiltroAbierto] = useState(false);

        useEffect(() => {
          cargarDatos();
        }, []);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [
          vistaActual,
          candidatos,
          vacantes,
          cuestionarios,
          cargando,
          errorConexion,
          mostrarModalCandidato,
          mostrarModalVacante,
          mostrarModalEvaluacion,
          mostrarModalCuestionario,
          menuFiltroAbierto,
          filtroEstadoCandidato,
          filtroEstadoVacante,
          filtroEstadoCuestionario,
          busqueda,
          decisionEvaluacion,
        ]);

        const cargarDatos = async () => {
          setCargando(true);
          setErrorConexion(false);
          try {
            const resVacantes = await fetch(`${API_URL}/vacantes/`);
            if (!resVacantes.ok) throw new Error("Error obteniendo vacantes");
            const dataVacantes = await resVacantes.json();

            const resCandidatos = await fetch(`${API_URL}/candidatos/`);
            if (!resCandidatos.ok)
              throw new Error("Error obteniendo candidatos");
            const dataCandidatos = await resCandidatos.json();

            const resCuestionarios = await fetch(`${API_URL}/cuestionarios/`);
            if (resCuestionarios.ok) {
              const dataCuestionarios = await resCuestionarios.json();
              setCuestionarios(dataCuestionarios);
            }

            setVacantes(dataVacantes);

            const candidatosAdaptados = dataCandidatos.map((c) => {
              const tieneArchivo = c.url_cv && c.url_cv.startsWith("/");
              const habilidadesArray = c.habilidades
                ? c.habilidades
                    .split(",")
                    .map((s) => s.trim())
                    .filter(Boolean)
                : [];

              let respuestasParseadas = null;
              try {
                if (c.respuestas_cuestionario) {
                  respuestasParseadas = JSON.parse(c.respuestas_cuestionario);
                }
              } catch (e) {}

              return {
                id: c.id,
                nombre: c.nombre_completo,
                email: c.email,
                origen: c.origen,
                documento: tieneArchivo ? c.url_cv : null,
                habilidades: habilidadesArray,
                estado: c.estado || "Recibido",
                historial: c.historial
                  ? c.historial
                      .split("|")
                      .map((s) => s.trim())
                      .filter((s) => s)
                  : ["CV Registrado en MySQL"],
                vacanteId: c.id_vacante || null,
                respuestas_cuestionario: respuestasParseadas,
              };
            });
            setCandidatos(candidatosAdaptados);
          } catch (error) {
            console.error("Error conectando con la API:", error);
            setErrorConexion(true);
          } finally {
            setCargando(false);
          }
        };

        const handleGuardarVacante = async (e) => {
          e.preventDefault();
          try {
            const url = modoEdicionVacante
              ? `${API_URL}/vacantes/${nuevaVacante.id}`
              : `${API_URL}/vacantes/`;
            const method = modoEdicionVacante ? "PUT" : "POST";

            const payload = {
              ...nuevaVacante,
              id_cuestionario: nuevaVacante.id_cuestionario
                ? parseInt(nuevaVacante.id_cuestionario)
                : null,
            };

            const response = await fetch(url, {
              method: method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (response.ok) {
              cargarDatos();
              setMostrarModalVacante(false);
              resetFormularioVacante();
            } else {
              alert("Error al guardar la vacante.");
            }
          } catch (error) {
            console.error(error);
          }
        };

        const abrirModalEdicionVacante = (vacante) => {
          setNuevaVacante({
            id: vacante.id,
            titulo: vacante.titulo,
            descripcion: vacante.descripcion,
            estado: vacante.estado,
            id_creador: vacante.id_creador,
            id_cuestionario: vacante.id_cuestionario || "",
          });
          setModoEdicionVacante(true);
          setMostrarModalVacante(true);
        };
        const abrirModalNuevaVacante = () => {
          resetFormularioVacante();
          setMostrarModalVacante(true);
        };
        const resetFormularioVacante = () => {
          setNuevaVacante({
            id: null,
            titulo: "",
            descripcion: "",
            estado: "Abierta",
            id_creador: 1,
            id_cuestionario: "",
          });
          setModoEdicionVacante(false);
        };

        const handleGuardarCandidato = async (e) => {
          e.preventDefault();
          try {
            const formData = new FormData();
            formData.append("nombre_completo", nuevoCandidato.nombre_completo);
            formData.append("email", nuevoCandidato.email);
            formData.append("origen", nuevoCandidato.origen);

            formData.append(
              "habilidades",
              nuevoCandidato.habilidades ? nuevoCandidato.habilidades : "",
            );

            if (nuevoCandidato.vacanteId)
              formData.append("id_vacante", nuevoCandidato.vacanteId);
            if (nuevoCandidato.cvFile)
              formData.append("cv", nuevoCandidato.cvFile);

            const url = modoEdicionCandidato
              ? `${API_URL}/candidatos/${nuevoCandidato.id}`
              : `${API_URL}/candidatos/`;
            const method = modoEdicionCandidato ? "PUT" : "POST";
            const response = await fetch(url, {
              method: method,
              body: formData,
            });

            if (response.ok) {
              cargarDatos();
              setMostrarModalCandidato(false);
              resetFormularioCandidato();
            } else {
              const errorData = await response.json();
              alert("Error: " + (errorData.detail || "No se pudo guardar"));
            }
          } catch (error) {
            console.error(error);
          }
        };

        const abrirModalEdicionCandidato = (candidato) => {
          setNuevoCandidato({
            id: candidato.id,
            nombre_completo: candidato.nombre,
            email: candidato.email,
            origen: candidato.origen,
            habilidades: candidato.habilidades.join(", "),
            vacanteId: candidato.vacanteId || "",
            cvFile: null,
          });
          setModoEdicionCandidato(true);
          setMostrarModalCandidato(true);
        };
        const abrirModalNuevoCandidato = () => {
          resetFormularioCandidato();
          setMostrarModalCandidato(true);
        };
        const resetFormularioCandidato = () => {
          setNuevoCandidato({
            id: null,
            nombre_completo: "",
            email: "",
            origen: "Correo",
            habilidades: "",
            cvFile: null,
            vacanteId: "",
          });
          setModoEdicionCandidato(false);
        };

        const handleEvaluar = async (e) => {
          e.preventDefault();
          if (!candidatoSeleccionado) return;
          const form = e.target;
          const decision = form.decision.value;
          const comentarios = form.comentarios.value;
          const evaluador = form.evaluador.value;

          let fechaFormateada = null;
          if (form.fecha_entrevista && form.fecha_entrevista.value) {
            const dateObj = new Date(form.fecha_entrevista.value);
            fechaFormateada = dateObj.toLocaleString("es-MX", {
              day: "2-digit",
              month: "short",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
          }

          const nuevoEstado =
            decision === "Aceptar"
              ? "Aceptado"
              : decision === "Rechazar"
                ? "Rechazado"
                : "Entrevista";

          try {
            const response = await fetch(
              `${API_URL}/candidatos/${candidatoSeleccionado.id}/evaluar`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  estado: nuevoEstado,
                  comentarios: comentarios,
                  evaluador: evaluador,
                  fecha_entrevista: fechaFormateada,
                }),
              },
            );
            if (response.ok) {
              cargarDatos();
              setMostrarModalEvaluacion(false);
              setCandidatoSeleccionado(null);
            } else {
              alert("Error al guardar la evaluación.");
            }
          } catch (error) {
            console.error(error);
          }
        };

        const handleEliminarVacante = async (id) => {
          if (
            window.confirm(
              "¿Seguro que deseas eliminar esta vacante de forma permanente?",
            )
          ) {
            try {
              const response = await fetch(`${API_URL}/vacantes/${id}`, {
                method: "DELETE",
              });
              if (response.ok) cargarDatos();
            } catch (error) {
              console.error(error);
            }
          }
        };

        const handleEliminarCandidato = async (id) => {
          if (
            window.confirm(
              "¿Seguro que deseas eliminar este candidato de forma permanente?",
            )
          ) {
            try {
              const response = await fetch(`${API_URL}/candidatos/${id}`, {
                method: "DELETE",
              });
              if (response.ok) cargarDatos();
            } catch (error) {
              console.error(error);
            }
          }
        };

        const handlePreguntaChange = (index, field, value) => {
          const nuevasPreguntas = [...nuevoCuestionario.preguntas];
          nuevasPreguntas[index][field] = value;
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const handleOpcionChange = (pIndex, oIndex, value) => {
          const nuevasPreguntas = [...nuevoCuestionario.preguntas];
          nuevasPreguntas[pIndex].opciones[oIndex] = value;
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const handleOpcionCorrectaChange = (pIndex, oIndex) => {
          const nuevasPreguntas = [...nuevoCuestionario.preguntas];
          nuevasPreguntas[pIndex].opcionCorrecta = oIndex;
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const addOpcion = (pIndex) => {
          const nuevasPreguntas = [...nuevoCuestionario.preguntas];
          nuevasPreguntas[pIndex].opciones.push("");
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const removeOpcion = (pIndex, oIndex) => {
          const nuevasPreguntas = [...nuevoCuestionario.preguntas];
          nuevasPreguntas[pIndex].opciones = nuevasPreguntas[
            pIndex
          ].opciones.filter((_, i) => i !== oIndex);
          if (nuevasPreguntas[pIndex].opcionCorrecta === oIndex)
            nuevasPreguntas[pIndex].opcionCorrecta = 0;
          else if (nuevasPreguntas[pIndex].opcionCorrecta > oIndex)
            nuevasPreguntas[pIndex].opcionCorrecta -= 1;
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const addPregunta = () => {
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: [
              ...nuevoCuestionario.preguntas,
              { texto: "", tipo: "abierta", opciones: [""], opcionCorrecta: 0 },
            ],
          });
        };

        const removePregunta = (index) => {
          const nuevasPreguntas = nuevoCuestionario.preguntas.filter(
            (_, i) => i !== index,
          );
          setNuevoCuestionario({
            ...nuevoCuestionario,
            preguntas: nuevasPreguntas,
          });
        };

        const abrirModalEdicionCuestionario = (cuestionario) => {
          let preguntasParsed = [];
          try {
            preguntasParsed = cuestionario.preguntas.startsWith("[")
              ? JSON.parse(cuestionario.preguntas)
              : [
                  {
                    texto: cuestionario.preguntas,
                    tipo: "abierta",
                    opciones: [""],
                    opcionCorrecta: 0,
                  },
                ];
          } catch (e) {
            preguntasParsed = [
              { texto: "", tipo: "abierta", opciones: [""], opcionCorrecta: 0 },
            ];
          }
          setNuevoCuestionario({
            id: cuestionario.id,
            titulo: cuestionario.titulo,
            preguntas: preguntasParsed,
          });
          setModoEdicionCuestionario(true);
          setMostrarModalCuestionario(true);
        };

        const handleGuardarCuestionario = async (e) => {
          e.preventDefault();
          const preguntasValidas = nuevoCuestionario.preguntas.filter(
            (p) => p.texto.trim() !== "",
          );
          if (preguntasValidas.length === 0)
            return alert(
              "El cuestionario debe tener al menos una pregunta válida.",
            );

          try {
            const url = modoEdicionCuestionario
              ? `${API_URL}/cuestionarios/${nuevoCuestionario.id}`
              : `${API_URL}/cuestionarios/`;
            const method = modoEdicionCuestionario ? "PUT" : "POST";

            const response = await fetch(url, {
              method: method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                titulo: nuevoCuestionario.titulo,
                preguntas: JSON.stringify(preguntasValidas),
              }),
            });

            if (response.ok) {
              cargarDatos();
              setMostrarModalCuestionario(false);
              setNuevoCuestionario({
                id: null,
                titulo: "",
                preguntas: [
                  {
                    texto: "",
                    tipo: "abierta",
                    opciones: [""],
                    opcionCorrecta: 0,
                  },
                ],
              });
              setModoEdicionCuestionario(false);
            }
          } catch (error) {
            console.error(error);
          }
        };

        const handleEliminarCuestionario = async (id) => {
          if (
            window.confirm("¿Seguro que deseas eliminar este cuestionario?")
          ) {
            try {
              const response = await fetch(`${API_URL}/cuestionarios/${id}`, {
                method: "DELETE",
              });
              if (response.ok) cargarDatos();
            } catch (error) {
              console.error(error);
            }
          }
        };

        const candidatosFiltrados = candidatos.filter((c) => {
          const searchMatch =
            busqueda.toLowerCase() === "" ||
            c.nombre?.toLowerCase().includes(busqueda.toLowerCase()) ||
            (c.habilidades &&
              c.habilidades.some((h) =>
                h.toLowerCase().includes(busqueda.toLowerCase()),
              ));
          const estadoMatch =
            filtroEstadoCandidato === "Todos" ||
            c.estado === filtroEstadoCandidato;
          return searchMatch && estadoMatch;
        });

        const vacantesFiltradas = vacantes.filter((v) => {
          const searchMatch =
            busqueda.toLowerCase() === "" ||
            v.titulo?.toLowerCase().includes(busqueda.toLowerCase()) ||
            v.descripcion?.toLowerCase().includes(busqueda.toLowerCase());
          const estadoMatch =
            filtroEstadoVacante === "Todas" || v.estado === filtroEstadoVacante;
          return searchMatch && estadoMatch;
        });

        const cuestionariosFiltrados = cuestionarios.filter((c) => {
          return (
            busqueda.toLowerCase() === "" ||
            c.titulo?.toLowerCase().includes(busqueda.toLowerCase())
          );
        });

        const getNombreVacante = (id) => {
          if (!id) return "Candidatura General";
          const vacante = vacantes.find((v) => v.id === parseInt(id));
          return vacante ? vacante.titulo : "Candidatura General";
        };

        const renderEstadoBadge = (estadoOriginal) => {
          let estado = estadoOriginal
            ? String(estadoOriginal).trim()
            : "Recibido";
          if (estado === "Aceptar") estado = "Aceptado";
          if (estado === "Rechazar") estado = "Rechazado";

          switch (estado) {
            case "Aceptado":
              return (
                <span className="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <svg
                    className="w-3.5 h-3.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>{" "}
                  Aceptado
                </span>
              );
            case "Rechazado":
              return (
                <span className="px-3 py-1 bg-red-100 text-red-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <svg
                    className="w-3.5 h-3.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>{" "}
                  Rechazado
                </span>
              );
            case "Entrevista":
              return (
                <span className="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <svg
                    className="w-3.5 h-3.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    ></path>
                  </svg>{" "}
                  Entrevista
                </span>
              );
            default:
              return (
                <span className="px-3 py-1 bg-gray-100 text-gray-800 rounded-full text-xs font-semibold flex items-center gap-1 w-fit">
                  <svg
                    className="w-3.5 h-3.5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>{" "}
                  {estado}
                </span>
              );
          }
        };

        if (cargando && vacantes.length === 0) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
              <div className="w-12 h-12 border-4 border-teal-200 border-t-teal-600 rounded-full animate-spin mb-4"></div>
              <p className="text-slate-600 font-medium">
                Conectando a FastAPI (MySQL)...
              </p>
            </div>
          );
        }

        const tituloHeader = () => {
          if (vistaActual === "candidatos") return "Directorio de Candidatos";
          if (vistaActual === "vacantes") return "Gestión de Vacantes";
          if (vistaActual === "cuestionarios")
            return "Encuestas y Cuestionarios";
          if (vistaActual === "documentacion")
            return "Documentación del Proyecto";
        };

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
            <aside className="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl shrink-0 z-20 relative">
              <div className="p-6 border-b border-slate-700">
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <i
                    data-lucide="briefcase"
                    className="w-6 h-6 text-teal-400"
                  ></i>{" "}
                  TheOpenRoad
                </h1>
                <p className="text-xs text-slate-400 mt-1">SA de CV</p>
              </div>

              <nav className="flex-1 py-4">
                <ul className="space-y-1">
                  <li>
                    <button
                      onClick={() => {
                        setVistaActual("candidatos");
                        setBusqueda("");
                      }}
                      className={`w-full flex items-center gap-3 px-6 py-3 hover:bg-slate-800 transition-colors ${vistaActual === "candidatos" ? "bg-slate-800 text-teal-400 border-r-4 border-teal-400" : ""}`}
                    >
                      <i data-lucide="users" className="w-5 h-5"></i>
                      <span className="font-medium">Base de Candidatos</span>
                    </button>
                  </li>
                  <li>
                    <button
                      onClick={() => {

      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
