<!doctype html>
<html lang="es" className="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheOpenRoad SA de CV - Plataforma de Gestión Operativa</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        overflow-x: hidden;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      .fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      .delay-100 {
        animation-delay: 100ms;
      }
      .delay-200 {
        animation-delay: 200ms;
      }
      .delay-300 {
        animation-delay: 300ms;
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .glow-bg {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(20, 184, 166, 0.15) 0%,
          rgba(15, 23, 42, 0) 70%
        );
        border-radius: 50%;
        z-index: -1;
        pointer-events: none;
      }

      .feature-card {
        transition: all 0.3s ease;
      }
      .feature-card:hover {
        transform: translateY(-5px);
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.5),
          0 8px 10px -6px rgba(0, 0, 0, 0.5);
        border-color: #14b8a6; /* teal-500 */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const LandingPage = () => {
        const [isScrolled, setIsScrolled] = useState(false);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

        useEffect(() => {
          const handleScroll = () => {
            setIsScrolled(window.scrollY > 50);
          };
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        });

        const features = [
          {
            title: "Expansión y Selección",
            desc: "Selección e incorporación de nuevas líneas de actividad, con opciones adaptadas a presupuesto, ubicación y potencial de rendimiento.",
            icon: "map",
          },
          {
            title: "Supervisión Integral",
            desc: "Control exacto de niveles de existencias, estado de producción, disponibilidad de insumos y rendimiento de cada unidad en tiempo real.",
            icon: "activity",
          },
          {
            title: "Mejora Continua",
            desc: "Implementación de mejoras: actualización de equipamiento, refuerzo de seguridad y optimización de procesos operativos.",
            icon: "settings",
          },
          {
            title: "Logística y Comercialización",
            desc: "Coordinación de operaciones logísticas, permitiendo programar entregas y maximizar ingresos según condiciones del mercado.",

            title: "Inteligencia de Negocio",

                isScrolled

              }`}

                <div className="flex items-center gap-2">
                  <i
                    data-lucide="compass"
                    className="w-8 h-8 text-teal-400"
                  ></i>
                  <span className="text-xl font-bold tracking-wider text-white">

                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
